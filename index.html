<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KV. Läroboken 13 — Electrical Components</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── header ── */
    header {
      flex: 0 0 auto;
      padding: 10px 20px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #f1f5f9;
      letter-spacing: 0.3px;
    }
    header span {
      font-size: 12px;
      color: #64748b;
    }
    .legend {
      display: flex;
      gap: 14px;
      margin-left: auto;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #94a3b8;
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 2px;
    }

    /* ── main layout ── */
    main {
      flex: 1 1 0;
      display: flex;
      overflow: hidden;
    }

    /* ── drawing pane ── */
    #drawing-pane {
      flex: 1 1 0;
      overflow: auto;
      padding: 16px;
      background: #0f172a;
    }

    #image-wrap {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    #drawing-img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    /* ── component overlays ── */
    .comp-overlay {
      position: absolute;
      border: 2px solid transparent;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .comp-overlay:hover,
    .comp-overlay.active {
      background: rgba(255,255,255,0.15) !important;
      border-color: currentColor !important;
    }

    /* ── tooltip ── */
    #tooltip {
      position: fixed;
      display: none;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.6;
      max-width: 240px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      pointer-events: none;
      z-index: 1000;
    }
    #tooltip .tt-type {
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 4px;
    }
    #tooltip .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: #94a3b8;
    }
    #tooltip .tt-row strong { color: #e2e8f0; }

    /* ── sidebar ── */
    #sidebar {
      flex: 0 0 260px;
      background: #1e293b;
      border-left: 1px solid #334155;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sidebar h2 {
      flex: 0 0 auto;
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-bottom: 1px solid #334155;
    }
    #comp-list {
      flex: 1 1 0;
      overflow-y: auto;
      padding: 8px 0;
    }
    .comp-card {
      padding: 9px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s;
    }
    .comp-card:hover,
    .comp-card.active {
      background: #0f172a;
    }
    .comp-card.active {
      border-left-color: var(--c);
    }
    .comp-card-title {
      font-size: 13px;
      font-weight: 600;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .comp-card-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .comp-card-sub {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }
  </style>
</head>
<body>

<header>
  <h1>KV. Läroboken 13 — HUS A DEL 1 PLAN 100</h1>
  <span>Kanalisation 1:50</span>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#3b82f6"></div>KS — Cable Ladder
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#10b981"></div>KR — Cable Tray
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#f59e0b"></div>FBK — Window Sill Channel
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#8b5cf6"></div>Tomrör — Conduit
    </div>
  </div>
</header>

<main>
  <div id="drawing-pane">
    <div id="image-wrap">
      <img id="drawing-img" src="/image" alt="Electrical drawing" draggable="false">
      <!-- overlays injected by JS -->
    </div>
  </div>

  <nav id="sidebar">
    <h2>Components <span id="count"></span></h2>
    <div id="comp-list"></div>
  </nav>
</main>

<div id="tooltip"></div>

<script>
  let components = [];
  let pageW = 1, pageH = 1;
  let activeId = null;

  // ── fetch data & build UI ─────────────────────────────────────────────────
  fetch('/components')
    .then(r => r.json())
    .then(data => {
      components = data.components;
      pageW = data.page_width;
      pageH = data.page_height;
      // Only drawn instances (bbox !== null) get overlays
      const drawn = components.filter(c => c.bbox !== null);
      document.getElementById('count').textContent = `(${drawn.length} drawn)`;
      buildOverlays();
      buildSidebar();
    });

  // ── build overlays ────────────────────────────────────────────────────────
  function buildOverlays() {
    const wrap = document.getElementById('image-wrap');
    const img  = document.getElementById('drawing-img');

    // Remove old overlays
    wrap.querySelectorAll('.comp-overlay').forEach(e => e.remove());

    const scaleX = img.clientWidth  / pageW;
    const scaleY = img.clientHeight / pageH;

    components.filter(c => c.bbox !== null).forEach(c => {
      const [x0, y0, x1, y1] = c.bbox;
      const div = document.createElement('div');
      div.className = 'comp-overlay';
      div.dataset.id = c.id;
      div.style.cssText = `
        left:   ${x0 * scaleX}px;
        top:    ${y0 * scaleY}px;
        width:  ${(x1 - x0) * scaleX}px;
        height: ${(y1 - y0) * scaleY}px;
        color: ${c.color};
        border-color: ${c.color}66;
        background: ${c.color}18;
      `;

      div.addEventListener('mouseenter', e => showTooltip(e, c));
      div.addEventListener('mousemove',  e => moveTooltip(e));
      div.addEventListener('mouseleave', hideTooltip);
      div.addEventListener('click', () => selectComponent(c.id));
      wrap.appendChild(div);
    });
  }

  // Rebuild overlays when image finishes loading (actual size known)
  document.getElementById('drawing-img').addEventListener('load', buildOverlays);
  window.addEventListener('resize', buildOverlays);

  // ── sidebar ───────────────────────────────────────────────────────────────
  function buildSidebar() {
    const list = document.getElementById('comp-list');

    const drawn  = components.filter(c => c.bbox !== null);
    const legend = components.filter(c => c.bbox === null);

    // Drawn instances
    drawn.forEach(c => {
      const card = document.createElement('div');
      card.className = 'comp-card';
      card.dataset.id = c.id;
      card.style.setProperty('--c', c.color);

      const heights = [];
      if (c.ok_height) heights.push(`ÖK ${c.ok_height} mm ÖFG`);
      if (c.uk_height) heights.push(`UK ${c.uk_height} mm ÖFG`);
      const fireBadge = c.fire_rating
        ? `<span class="comp-card-badge" style="background:#ef444422;color:#ef4444;margin-left:4px">${c.fire_rating}</span>`
        : '';
      const vertTag = c.is_vertical ? ' <em style="color:#94a3b8;font-size:10px">VERT</em>' : '';

      card.innerHTML = `
        <div class="comp-card-title">
          <span class="comp-card-badge"
                style="background:${c.color}22;color:${c.color}">${c.type}</span>
          ${c.name} ${c.size ? c.size + ' mm' : ''}${vertTag}${fireBadge}
        </div>
        <div class="comp-card-sub">${heights.join(' · ') || 'No height data'}</div>
      `;

      card.addEventListener('click', () => selectComponent(c.id));
      list.appendChild(card);
    });

    // Legend / notes section
    if (legend.length) {
      const sep = document.createElement('div');
      sep.style.cssText = 'padding:8px 16px 4px;font-size:10px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:0.8px;border-top:1px solid #334155;margin-top:4px';
      sep.textContent = 'From legend / notes';
      list.appendChild(sep);

      legend.forEach(c => {
        const card = document.createElement('div');
        card.className = 'comp-card';
        card.dataset.id = c.id;
        card.style.setProperty('--c', c.color);
        card.style.opacity = '0.75';

        const heights = [];
        if (c.ok_height) heights.push(`ÖK ${c.ok_height} mm ÖFG`);
        if (c.uk_height) heights.push(`UK ${c.uk_height} mm ÖFG`);
        const diam = c.diameter_mm ? `Ø${c.diameter_mm} mm` : '';
        const sub = [diam, heights.join(' · ')].filter(Boolean).join('  ') || 'Size per drawing';

        card.innerHTML = `
          <div class="comp-card-title">
            <span class="comp-card-badge"
                  style="background:${c.color}22;color:${c.color}">${c.type}</span>
            ${c.name}
          </div>
          <div class="comp-card-sub">${sub}</div>
        `;
        list.appendChild(card);
      });
    }
  }

  // ── selection ─────────────────────────────────────────────────────────────
  function selectComponent(id) {
    activeId = (activeId === id) ? null : id;

    document.querySelectorAll('.comp-overlay, .comp-card').forEach(el => {
      el.classList.toggle('active', el.dataset.id === activeId);
    });

    if (activeId) {
      const card = document.querySelector(`.comp-card[data-id="${activeId}"]`);
      if (card) card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

      // scroll drawing to overlay
      const overlay = document.querySelector(`.comp-overlay[data-id="${activeId}"]`);
      if (overlay) overlay.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
  }

  // ── tooltip ───────────────────────────────────────────────────────────────
  const tt = document.getElementById('tooltip');

  function showTooltip(e, c) {
    const heights = [];
    if (c.ok_height) heights.push(`<div class="tt-row"><span>ÖK (top)</span><strong>${c.ok_height} mm ÖFG</strong></div>`);
    if (c.uk_height) heights.push(`<div class="tt-row"><span>UK (bottom)</span><strong>${c.uk_height} mm ÖFG</strong></div>`);

    const fireLine = c.fire_rating
      ? `<div class="tt-row"><span>Fire rating</span><strong style="color:#ef4444">${c.fire_rating}</strong></div>`
      : '';
    const vertLine = c.is_vertical
      ? `<div class="tt-row"><span>Orientation</span><strong>Vertical</strong></div>`
      : '';

    tt.innerHTML = `
      <div class="tt-type" style="color:${c.color}">${c.name}</div>
      <div class="tt-row"><span>Code</span><strong>${c.type} ${c.size || ''}${c.size ? ' mm' : ''}</strong></div>
      <div class="tt-row"><span>English</span><strong>${c.en_name}</strong></div>
      ${heights.join('')}
      ${fireLine}${vertLine}
    `;
    tt.style.display = 'block';
    moveTooltip(e);
  }

  function moveTooltip(e) {
    const pad = 14;
    const tw = tt.offsetWidth, th = tt.offsetHeight;
    let x = e.clientX + pad, y = e.clientY + pad;
    if (x + tw > window.innerWidth  - 8) x = e.clientX - tw - pad;
    if (y + th > window.innerHeight - 8) y = e.clientY - th - pad;
    tt.style.left = x + 'px';
    tt.style.top  = y + 'px';
  }

  function hideTooltip() {
    tt.style.display = 'none';
  }
</script>
</body>
</html>
