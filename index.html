<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KV. Läroboken 13 — Electrical Components</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── header ── */
    header {
      flex: 0 0 auto;
      padding: 10px 20px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #f1f5f9;
      letter-spacing: 0.3px;
    }
    header span {
      font-size: 12px;
      color: #64748b;
    }
    .legend {
      display: flex;
      gap: 14px;
      margin-left: auto;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #94a3b8;
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 2px;
    }

    /* ── main layout ── */
    main {
      flex: 1 1 0;
      display: flex;
      overflow: hidden;
    }

    /* ── drawing pane ── */
    #drawing-pane {
      flex: 1 1 0;
      overflow: auto;
      padding: 16px;
      background: #0f172a;
    }

    #image-wrap {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    #drawing-img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    /* ── component overlays ── */
    .comp-overlay {
      position: absolute;
      border: 2px solid transparent;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .comp-overlay:hover,
    .comp-overlay.active {
      background: rgba(255,255,255,0.15) !important;
      border-color: currentColor !important;
    }

    /* ── tooltip ── */
    #tooltip {
      position: fixed;
      display: none;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.6;
      max-width: 240px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      pointer-events: none;
      z-index: 1000;
    }
    #tooltip .tt-type {
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 4px;
    }
    #tooltip .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: #94a3b8;
    }
    #tooltip .tt-row strong { color: #e2e8f0; }

    /* ── sidebar ── */
    /* ── sidebar tabs ── */
    .sidebar-tabs {
      flex: 0 0 auto;
      display: flex;
      border-bottom: 1px solid #334155;
    }
    .sidebar-tab {
      flex: 1;
      padding: 9px 0;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      color: #64748b;
      cursor: pointer;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border-bottom: 2px solid transparent;
      transition: color 0.1s, border-color 0.1s;
    }
    .sidebar-tab.active {
      color: #e2e8f0;
      border-bottom-color: #3b82f6;
    }
    .sidebar-panel { display: none; flex: 1 1 0; overflow-y: auto; padding: 8px 0; }
    .sidebar-panel.active { display: block; }

    /* ── estimate cards ── */
    .est-card {
      padding: 10px 16px;
      border-left: 3px solid transparent;
    }
    .est-title {
      font-size: 12px;
      font-weight: 600;
      color: #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .est-sub {
      font-size: 11px;
      color: #64748b;
      margin-top: 3px;
      line-height: 1.5;
    }
    .est-cost {
      font-size: 13px;
      font-weight: 700;
      color: #34d399;
    }
    .est-conf {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: 600;
    }
    .est-totals {
      margin: 8px 12px;
      padding: 10px 12px;
      background: #0f172a;
      border-radius: 6px;
      border: 1px solid #334155;
      font-size: 12px;
    }
    .est-totals .tot-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      color: #94a3b8;
    }
    .est-totals .tot-row strong { color: #e2e8f0; }
    .est-totals .grand { border-top: 1px solid #334155; margin-top: 6px; padding-top: 6px; color: #f1f5f9; font-weight: 700; }

    #sidebar {
      flex: 0 0 280px;
      background: #1e293b;
      border-left: 1px solid #334155;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sidebar h2 {
      flex: 0 0 auto;
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-bottom: 1px solid #334155;
    }
    #comp-list {
      flex: 1 1 0;
      overflow-y: auto;
      padding: 8px 0;
    }
    .comp-card {
      padding: 9px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s;
    }
    .comp-card:hover,
    .comp-card.active {
      background: #0f172a;
    }
    .comp-card.active {
      border-left-color: var(--c);
    }
    .comp-card-title {
      font-size: 13px;
      font-weight: 600;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .comp-card-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .comp-card-sub {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }
  </style>
</head>
<body>

<header>
  <h1>KV. Läroboken 13 — HUS A DEL 1 PLAN 100</h1>
  <span>Kanalisation 1:50</span>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#3b82f6"></div>KS — Cable Ladder
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#10b981"></div>KR — Cable Tray
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#f59e0b"></div>FBK — Window Sill Channel
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#8b5cf6"></div>Tomrör — Conduit
    </div>
  </div>
</header>

<main>
  <div id="drawing-pane">
    <div id="image-wrap">
      <img id="drawing-img" src="/image" alt="Electrical drawing" draggable="false">
      <!-- overlays injected by JS -->
    </div>
  </div>

  <nav id="sidebar">
    <div class="sidebar-tabs">
      <div class="sidebar-tab active" data-panel="comp-panel">Components</div>
      <div class="sidebar-tab"        data-panel="est-panel">Estimate</div>
    </div>
    <div id="comp-panel" class="sidebar-panel active">
      <div style="padding:6px 16px 2px;font-size:11px;color:#475569" id="count"></div>
      <div id="comp-list"></div>
    </div>
    <div id="est-panel" class="sidebar-panel">
      <div id="est-list"></div>
    </div>
  </nav>
</main>

<div id="tooltip"></div>

<script>
  let components = [];
  let pageW = 1, pageH = 1;
  let activeId = null;

  // ── fetch data & build UI ─────────────────────────────────────────────────
  let summary = [];

  fetch('/components')
    .then(r => r.json())
    .then(data => {
      components = data.components;
      summary    = data.summary;
      pageW = data.page_width;
      pageH = data.page_height;
      const drawn = components.filter(c => c.bbox !== null);
      document.getElementById('count').textContent = `(${drawn.length} instances)`;
      buildOverlays();
      buildSidebar();
    });

  // ── build overlays ────────────────────────────────────────────────────────
  function buildOverlays() {
    const wrap = document.getElementById('image-wrap');
    const img  = document.getElementById('drawing-img');

    // Remove old overlays
    wrap.querySelectorAll('.comp-overlay').forEach(e => e.remove());

    const scaleX = img.clientWidth  / pageW;
    const scaleY = img.clientHeight / pageH;

    components.filter(c => c.bbox !== null).forEach(c => {
      const [x0, y0, x1, y1] = c.bbox;
      const div = document.createElement('div');
      div.className = 'comp-overlay';
      div.dataset.id = c.id;
      div.style.cssText = `
        left:   ${x0 * scaleX}px;
        top:    ${y0 * scaleY}px;
        width:  ${(x1 - x0) * scaleX}px;
        height: ${(y1 - y0) * scaleY}px;
        color: ${c.color};
        border-color: ${c.color}66;
        background: ${c.color}18;
      `;

      div.addEventListener('mouseenter', e => showTooltip(e, c));
      div.addEventListener('mousemove',  e => moveTooltip(e));
      div.addEventListener('mouseleave', hideTooltip);
      div.addEventListener('click', () => selectComponent(c.id));
      wrap.appendChild(div);
    });
  }

  // Rebuild overlays when image finishes loading (actual size known)
  document.getElementById('drawing-img').addEventListener('load', buildOverlays);
  window.addEventListener('resize', buildOverlays);

  // ── sidebar ───────────────────────────────────────────────────────────────
  const COLOR = {
    KS: "#3b82f6", KR: "#10b981", FBK: "#f59e0b", "Tomrör": "#8b5cf6"
  };

  function buildSidebar() {
    const list = document.getElementById('comp-list');

    // ── Drawn + counted variants (from summary, count is a number) ────────
    const drawnSummary  = summary.filter(s => typeof s.count === 'number');
    const legendSummary = summary.filter(s => typeof s.count !== 'number');
    const col = s => COLOR[s.system] || "#94a3b8";

    drawnSummary.forEach(s => {
      const card = document.createElement('div');
      card.className = 'comp-card';
      card.style.setProperty('--c', col(s));

      const heights = [];
      if (s.ok_ofg_mm) heights.push(`ÖK ${s.ok_ofg_mm} mm ÖFG`);
      if (s.uk_ofg_mm) heights.push(`UK ${s.uk_ofg_mm} mm ÖFG`);

      const fireBadge = s.fire_rating
        ? `<span class="comp-card-badge" style="background:#ef444422;color:#ef4444;margin-left:4px">${s.fire_rating}</span>`
        : '';
      const vertTag = s.orientation === 'vertical'
        ? ' <em style="color:#94a3b8;font-size:10px">VERT</em>' : '';
      const widthStr = s.width_mm === 'per_drawing' ? 'per drawing'
                     : s.width_mm ? `${s.width_mm} mm` : '';
      const countBadge = `<span style="margin-left:auto;font-size:11px;color:#64748b">×${s.count}</span>`;

      card.innerHTML = `
        <div class="comp-card-title" style="justify-content:space-between">
          <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
            <span class="comp-card-badge"
                  style="background:${col(s)}22;color:${col(s)}">${s.system}</span>
            ${s.name} ${widthStr}${vertTag}${fireBadge}
          </div>
          ${countBadge}
        </div>
        <div class="comp-card-sub">${heights.join(' · ') || 'No height data'}</div>
      `;

      // clicking highlights all matching instances on the drawing
      card.addEventListener('click', () => selectVariant(s));
      list.appendChild(card);
    });

    // ── Legend / notes entries ────────────────────────────────────────────
    if (legendSummary.length) {
      const sep = document.createElement('div');
      sep.style.cssText = 'padding:8px 16px 4px;font-size:10px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:0.8px;border-top:1px solid #334155;margin-top:4px';
      sep.textContent = 'From legend / notes';
      list.appendChild(sep);

      legendSummary.forEach(s => {
        const card = document.createElement('div');
        card.className = 'comp-card';
        card.style.setProperty('--c', col(s));
        card.style.opacity = '0.75';

        const heights = [];
        if (s.ok_ofg_mm) heights.push(`ÖK ${s.ok_ofg_mm} mm ÖFG`);
        if (s.uk_ofg_mm) heights.push(`UK ${s.uk_ofg_mm} mm ÖFG`);
        const diam = s.diameter_mm ? `Ø${s.diameter_mm} mm` : '';
        const vertTag = s.orientation === 'vertical'
          ? ' <em style="color:#94a3b8;font-size:10px">VERT</em>' : '';
        const widthStr = s.width_mm === 'per_drawing' ? 'per drawing'
                       : s.width_mm ? `${s.width_mm} mm` : '';
        const sub = [diam, heights.join(' · ')].filter(Boolean).join('  ')
                    || (s.width_mm === 'per_drawing' ? 'Size per drawing' : 'No height data');

        card.innerHTML = `
          <div class="comp-card-title">
            <span class="comp-card-badge"
                  style="background:${col(s)}22;color:${col(s)}">${s.system}</span>
            ${s.name} ${widthStr}${vertTag}
          </div>
          <div class="comp-card-sub">${sub}</div>
        `;
        list.appendChild(card);
      });
    }
  }

  // ── select all drawn instances matching a summary variant ─────────────
  function selectVariant(s) {
    const matches = components.filter(c =>
      c.bbox !== null &&
      c.type        === s.system &&
      (c.size ? String(c.size) : null) === (s.width_mm !== 'per_drawing' ? String(s.width_mm) : null) &&
      (c.ok_height  || null) === (s.ok_ofg_mm  ? String(s.ok_ofg_mm)  : null) &&
      (c.uk_height  || null) === (s.uk_ofg_mm  ? String(s.uk_ofg_mm)  : null) &&
      (c.fire_rating || null) === (s.fire_rating || null)
    ).map(c => c.id);

    const allSame = matches.length > 0 &&
      matches.every(id => document.querySelector(`.comp-overlay[data-id="${id}"]`)?.classList.contains('active'));

    // Toggle: if all already active, deselect all; otherwise select all
    const nextState = !allSame;
    document.querySelectorAll('.comp-overlay, .comp-card').forEach(el => {
      el.classList.toggle('active', nextState && matches.includes(el.dataset.id));
    });
  }

  // ── selection ─────────────────────────────────────────────────────────────
  function selectComponent(id) {
    activeId = (activeId === id) ? null : id;

    document.querySelectorAll('.comp-overlay, .comp-card').forEach(el => {
      el.classList.toggle('active', el.dataset.id === activeId);
    });

    if (activeId) {
      const card = document.querySelector(`.comp-card[data-id="${activeId}"]`);
      if (card) card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

      // scroll drawing to overlay
      const overlay = document.querySelector(`.comp-overlay[data-id="${activeId}"]`);
      if (overlay) overlay.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
  }

  // ── tooltip ───────────────────────────────────────────────────────────────
  const tt = document.getElementById('tooltip');

  function showTooltip(e, c) {
    const heights = [];
    if (c.ok_height) heights.push(`<div class="tt-row"><span>ÖK (top)</span><strong>${c.ok_height} mm ÖFG</strong></div>`);
    if (c.uk_height) heights.push(`<div class="tt-row"><span>UK (bottom)</span><strong>${c.uk_height} mm ÖFG</strong></div>`);

    const fireLine = c.fire_rating
      ? `<div class="tt-row"><span>Fire rating</span><strong style="color:#ef4444">${c.fire_rating}</strong></div>`
      : '';
    const vertLine = c.is_vertical
      ? `<div class="tt-row"><span>Orientation</span><strong>Vertical</strong></div>`
      : '';

    tt.innerHTML = `
      <div class="tt-type" style="color:${c.color}">${c.name}</div>
      <div class="tt-row"><span>Code</span><strong>${c.type} ${c.size || ''}${c.size ? ' mm' : ''}</strong></div>
      <div class="tt-row"><span>English</span><strong>${c.en_name}</strong></div>
      ${heights.join('')}
      ${fireLine}${vertLine}
    `;
    tt.style.display = 'block';
    moveTooltip(e);
  }

  function moveTooltip(e) {
    const pad = 14;
    const tw = tt.offsetWidth, th = tt.offsetHeight;
    let x = e.clientX + pad, y = e.clientY + pad;
    if (x + tw > window.innerWidth  - 8) x = e.clientX - tw - pad;
    if (y + th > window.innerHeight - 8) y = e.clientY - th - pad;
    tt.style.left = x + 'px';
    tt.style.top  = y + 'px';
  }

  function hideTooltip() {
    tt.style.display = 'none';
  }

  // ── tab switching ─────────────────────────────────────────────────────────
  document.querySelectorAll('.sidebar-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.panel).classList.add('active');
    });
  });

  // ── estimation panel ──────────────────────────────────────────────────────
  const CONF_COLOR = c =>
    c >= 0.85 ? '#34d399' : c >= 0.65 ? '#fbbf24' : '#f87171';

  fetch('/estimate')
    .then(r => r.json())
    .then(data => buildEstimatePanel(data));

  function buildEstimatePanel(data) {
    const list = document.getElementById('est-list');
    const t    = data.totals;

    // ── totals block ──────────────────────────────────────────────────────
    const totDiv = document.createElement('div');
    totDiv.className = 'est-totals';
    const bySystemRows = Object.entries(t.by_system)
      .sort((a, b) => b[1].total_cost_sek - a[1].total_cost_sek)
      .map(([sys, v]) =>
        `<div class="tot-row"><span>${sys}</span><strong>${v.total_length_m} m &nbsp; ${v.total_cost_sek.toLocaleString()} SEK</strong></div>`
      ).join('');
    totDiv.innerHTML = `
      ${bySystemRows}
      <div class="tot-row grand">
        <span>Total (${t.total_length_m} m)</span>
        <strong>${t.total_cost_sek.toLocaleString()} SEK</strong>
      </div>
      <div style="font-size:10px;color:#475569;margin-top:6px">Excl. VAT · Indicative rates</div>
    `;
    list.appendChild(totDiv);

    // ── per-item cards ────────────────────────────────────────────────────
    data.items.filter(i => typeof i.count === 'number').forEach(item => {
      const card = document.createElement('div');
      card.className = 'est-card';
      const c   = COLOR[item.system] || '#94a3b8';
      card.style.borderLeftColor = c;

      const fr  = item.fire_rating
        ? `<span class="comp-card-badge" style="background:#ef444422;color:#ef4444">${item.fire_rating}</span>` : '';
      const v   = item.orientation === 'vertical'
        ? `<span class="comp-card-badge" style="background:#8b5cf622;color:#8b5cf6">VERT</span>` : '';
      const confColor = CONF_COLOR(item.confidence);
      const confBadge = `<span class="est-conf" style="background:${confColor}22;color:${confColor}">${(item.confidence * 100).toFixed(0)}%</span>`;

      const heightStr = [
        item.ok_ofg_mm ? `ÖK ${item.ok_ofg_mm}` : '',
        item.uk_ofg_mm ? `UK ${item.uk_ofg_mm}` : '',
      ].filter(Boolean).join(' / ') || '—';

      const confNotes = item.confidence_notes?.length
        ? `<div style="font-size:10px;color:#475569;margin-top:2px">${item.confidence_notes.join(' · ')}</div>`
        : '';

      card.innerHTML = `
        <div class="est-title">
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
            <span class="comp-card-badge" style="background:${c}22;color:${c}">${item.system}</span>
            ${item.width_mm === 'per_drawing' ? 'per drawing' : item.width_mm + ' mm'}
            ${fr}${v}
            <span style="color:#64748b;font-size:11px">×${item.count}</span>
          </div>
          ${confBadge}
        </div>
        <div class="est-sub">
          ${heightStr} &nbsp;·&nbsp;
          H: ${item.horizontal_length_mm / 1000}m &nbsp;·&nbsp;
          V: ${item.vertical_length_mm / 1000}m &nbsp;·&nbsp;
          ${item.total_length_m}m total
          <br>
          ${item.unit_cost_sek_per_m} SEK/m &nbsp;·&nbsp;
          <span class="est-cost">${item.total_cost_sek.toLocaleString()} SEK</span>
          <span style="color:#475569"> (${item.length_source})</span>
        </div>
        ${confNotes}
      `;
      list.appendChild(card);
    });
  }
</script>
</body>
</html>
