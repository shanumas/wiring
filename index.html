<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KV. Läroboken 13 — Electrical Components</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #ebebeb;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── header ── */
    header {
      flex: 0 0 auto;
      padding: 10px 20px;
      background: #1c2b4a;
      border-bottom: 1px solid #14213a;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.3px;
    }
    header span {
      font-size: 12px;
      color: #8a9bbf;
    }
    .legend {
      display: flex;
      gap: 14px;
      margin-left: auto;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #c0cbdf;
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 2px;
    }

    /* ── main layout ── */
    main {
      flex: 1 1 0;
      display: flex;
      overflow: hidden;
    }

    /* ── drawing pane ── */
    #drawing-pane {
      flex: 1 1 0;
      overflow: auto;
      padding: 16px;
      background: #ebebeb;
    }

    #image-wrap {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    #drawing-img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 2px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    }

    /* ── component overlays ── */
    .comp-overlay {
      position: absolute;
      border: 2px solid transparent;
      border-radius: 2px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .comp-overlay:hover,
    .comp-overlay.active {
      background: rgba(0,0,0,0.08) !important;
      border-color: currentColor !important;
    }

    /* ── tooltip ── */
    #tooltip {
      position: fixed;
      display: none;
      background: #ffffff;
      border: 1px solid #c8c8c8;
      border-radius: 3px;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.6;
      max-width: 240px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      pointer-events: none;
      z-index: 1000;
    }
    #tooltip .tt-type {
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 4px;
    }
    #tooltip .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: #666666;
    }
    #tooltip .tt-row strong { color: #1a1a1a; }

    /* ── sidebar ── */
    /* ── sidebar tabs ── */
    .sidebar-tabs {
      flex: 0 0 auto;
      display: flex;
      border-bottom: 1px solid #d4d4d4;
    }
    .sidebar-tab {
      flex: 1;
      padding: 9px 0;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      color: #888888;
      cursor: pointer;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border-bottom: 2px solid transparent;
      transition: color 0.1s, border-color 0.1s;
    }
    .sidebar-tab.active {
      color: #1c2b4a;
      border-bottom-color: #1c2b4a;
    }
    .sidebar-panel { display: none; flex: 1 1 0; overflow-y: auto; padding: 8px 0; }
    .sidebar-panel.active { display: block; }

    /* ── estimate cards ── */
    .est-card {
      padding: 10px 16px;
      border-left: 3px solid transparent;
    }
    .est-title {
      font-size: 12px;
      font-weight: 600;
      color: #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .est-sub {
      font-size: 11px;
      color: #666666;
      margin-top: 3px;
      line-height: 1.5;
    }
    .est-cost {
      font-size: 13px;
      font-weight: 700;
      color: #1a5c3a;
    }
    .est-conf {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 2px;
      font-weight: 600;
    }
    .est-totals {
      margin: 8px 12px;
      padding: 10px 12px;
      background: #f0f0f0;
      border-radius: 2px;
      border: 1px solid #d4d4d4;
      font-size: 12px;
    }
    .est-totals .tot-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      color: #555555;
    }
    .est-totals .tot-row strong { color: #1a1a1a; }
    .est-totals .grand { border-top: 1px solid #c8c8c8; margin-top: 6px; padding-top: 6px; color: #1a1a1a; font-weight: 700; }

    #sidebar {
      flex: 0 0 280px;
      background: #ffffff;
      border-left: 1px solid #d4d4d4;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sidebar h2 {
      flex: 0 0 auto;
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 600;
      color: #888888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-bottom: 1px solid #d4d4d4;
    }
    #comp-list {
      flex: 1 1 0;
      overflow-y: auto;
      padding: 8px 0;
    }
    .comp-card {
      padding: 9px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s;
    }
    .comp-card:hover,
    .comp-card.active {
      background: #f4f4f4;
    }
    .comp-card.active {
      border-left-color: var(--c);
    }
    .comp-card-title {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .comp-card-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 2px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .comp-card-sub {
      font-size: 11px;
      color: #777777;
      margin-top: 2px;
    }
    /* ── drawing controls ── */
    .drawing-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    #drawing-select {
      background: #14213a;
      color: #e8edf5;
      border: 1px solid #2e4070;
      border-radius: 3px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      max-width: 200px;
    }
    .upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: #2e4470;
      border: 1px solid #4a6296;
      border-radius: 3px;
      color: #c8d4ec;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .upload-btn:hover { background: #3a5490; }
    .upload-btn input[type=file] { display: none; }
    #upload-status {
      font-size: 11px;
      color: #8a9bbf;
      min-width: 80px;
    }
    #upload-status.busy  { color: #c8a84a; }
    #upload-status.done  { color: #4a9c6e; }
    #upload-status.error { color: #b84a4a; }

    /* ── mobile ── */
    @media (max-width: 640px) {
      body { height: 100dvh; }

      header {
        flex-wrap: wrap;
        padding: 8px 12px;
        gap: 6px;
      }
      header h1 { font-size: 13px; order: 1; }
      .legend   { display: none; }
      .drawing-controls {
        order: 2;
        width: 100%;
        gap: 6px;
      }
      #drawing-select { flex: 1; max-width: none; font-size: 13px; }
      .upload-btn     { font-size: 13px; padding: 5px 10px; }
      #upload-status  { min-width: 0; }

      main { flex-direction: column; }

      #drawing-pane {
        flex: 0 0 42dvh;
        padding: 8px;
        overflow: auto;
      }
      #image-wrap  { display: block; width: 100%; }
      #drawing-img { width: 100%; height: auto; }

      #sidebar {
        flex: 1 1 0;
        width: 100%;
        border-left: none;
        border-top: 2px solid #1c2b4a;
        min-height: 0;
      }

      #tooltip {
        position: fixed;
        bottom: 12px;
        left: 12px;
        right: 12px;
        top: auto;
        max-width: none;
        width: auto;
        border-radius: 4px;
        box-shadow: 0 -2px 16px rgba(0,0,0,0.18);
      }

      .comp-card  { padding: 10px 14px; }
      .est-card   { padding: 10px 14px; }
      .est-totals { margin: 8px 10px; }
    }
  </style>
</head>
<body>

<header>
  <h1 id="drawing-title">—</h1>
  <div class="drawing-controls">
    <select id="drawing-select" title="Switch drawing"></select>
    <label class="upload-btn" title="Upload PDF(s)">
      + Upload PDF
      <input type="file" id="file-input" accept=".pdf" multiple>
    </label>
    <span id="upload-status"></span>
  </div>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#1e4d8c"></div>KS
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#1a6b45"></div>KR
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#8a6200"></div>FBK
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#5a3a7a"></div>Tomrör
    </div>
  </div>
</header>

<main>
  <div id="drawing-pane">
    <div id="image-wrap">
      <img id="drawing-img" src="" alt="Electrical drawing" draggable="false">
      <!-- overlays injected by JS -->
    </div>
  </div>

  <nav id="sidebar">
    <div class="sidebar-tabs">
      <div class="sidebar-tab active" data-panel="comp-panel">Components</div>
      <div class="sidebar-tab"        data-panel="est-panel">Estimate</div>
    </div>
    <div id="comp-panel" class="sidebar-panel active">
      <div style="padding:6px 16px 2px;font-size:11px;color:#777777" id="count"></div>
      <div id="comp-list"></div>
    </div>
    <div id="est-panel" class="sidebar-panel">
      <div id="est-list"></div>
    </div>
  </nav>
</main>

<div id="tooltip"></div>

<script>
  let components = [];
  let summary    = [];
  let pageW = 1, pageH = 1;
  let activeId = null;
  let currentDrawing = null;
  let currentDrawingType = 'unknown';

  // ── drawing list + selector ────────────────────────────────────────────────
  async function loadDrawingList() {
    const { drawings } = await fetch('/drawings').then(r => r.json());
    const sel = document.getElementById('drawing-select');
    sel.innerHTML = drawings.map(n =>
      `<option value="${n}">${n}</option>`
    ).join('');
    if (drawings.length) switchDrawing(drawings[0]);
  }

  document.getElementById('drawing-select').addEventListener('change', e => {
    switchDrawing(e.target.value);
  });

  async function switchDrawing(name) {
    if (name === currentDrawing) return;
    currentDrawing = name;

    // Update image immediately (browser streams it)
    const img = document.getElementById('drawing-img');
    img.src = `/drawing/${encodeURIComponent(name)}/image`;

    // Update title
    document.getElementById('drawing-title').textContent = name.replace('.pdf', '');

    // Sync selector
    document.getElementById('drawing-select').value = name;

    // Fetch components + estimate in parallel
    const [compData, estData] = await Promise.all([
      fetch(`/drawing/${encodeURIComponent(name)}/components`).then(r => r.json()),
      fetch(`/drawing/${encodeURIComponent(name)}/estimate`).then(r => r.json()),
    ]);

    components          = compData.components;
    summary             = compData.summary;
    pageW               = compData.page_width;
    pageH               = compData.page_height;
    currentDrawingType  = compData.drawing_type || 'unknown';

    const drawn = components.filter(c => c.bbox !== null);
    document.getElementById('count').textContent =
      drawn.length > 0 ? `(${drawn.length} instances)` : '';

    activeId = null;
    buildOverlays();
    rebuildSidebar();
    rebuildEstimate(estData);
  }

  // ── file upload ────────────────────────────────────────────────────────────
  document.getElementById('file-input').addEventListener('change', async e => {
    const files = e.target.files;
    if (!files.length) return;

    const status = document.getElementById('upload-status');
    status.className = 'busy';
    status.textContent = `Processing ${files.length} file(s)…`;

    const form = new FormData();
    for (const f of files) form.append('files', f);

    try {
      const res  = await fetch('/upload', { method: 'POST', body: form });
      const data = await res.json();

      if (data.errors?.length) {
        status.className = 'error';
        status.textContent = data.errors.map(e => e.error).join(', ');
      } else {
        status.className = 'done';
        status.textContent = `✓ ${data.loaded.length} loaded`;
        setTimeout(() => { status.textContent = ''; status.className = ''; }, 3000);
      }

      // Refresh selector and switch to first newly loaded drawing
      const sel = document.getElementById('drawing-select');
      const allBefore = new Set([...sel.options].map(o => o.value));
      const { drawings } = await fetch('/drawings').then(r => r.json());
      sel.innerHTML = drawings.map(n => `<option value="${n}">${n}</option>`).join('');

      if (data.loaded.length) {
        const newName = data.loaded[0];
        await switchDrawing(newName);
      }
    } catch (err) {
      status.className = 'error';
      status.textContent = 'Upload failed';
    }

    e.target.value = '';   // reset so same file can be re-uploaded
  });

  // ── initial load ──────────────────────────────────────────────────────────
  loadDrawingList();

  const isTouchDevice = () => window.matchMedia('(pointer: coarse)').matches;

  // ── build overlays ────────────────────────────────────────────────────────
  function buildOverlays() {
    const wrap = document.getElementById('image-wrap');
    const img  = document.getElementById('drawing-img');

    // Remove old overlays
    wrap.querySelectorAll('.comp-overlay').forEach(e => e.remove());

    const scaleX = img.clientWidth  / pageW;
    const scaleY = img.clientHeight / pageH;

    components.filter(c => c.bbox !== null).forEach(c => {
      const [x0, y0, x1, y1] = c.bbox;
      const div = document.createElement('div');
      div.className = 'comp-overlay';
      div.dataset.id = c.id;
      div.style.cssText = `
        left:   ${x0 * scaleX}px;
        top:    ${y0 * scaleY}px;
        width:  ${(x1 - x0) * scaleX}px;
        height: ${(y1 - y0) * scaleY}px;
        color: ${c.color};
        border-color: ${c.color}66;
        background: ${c.color}18;
      `;

      div.addEventListener('mouseenter', e => showTooltip(e, c));
      div.addEventListener('mousemove',  e => moveTooltip(e));
      div.addEventListener('mouseleave', hideTooltip);
      div.addEventListener('click', e => {
        selectComponent(c.id);
        if (isTouchDevice()) {
          showTooltip(e, c);
          clearTimeout(tt._hideTimer);
          tt._hideTimer = setTimeout(hideTooltip, 3000);
        }
      });
      wrap.appendChild(div);
    });
  }

  // Rebuild overlays when image finishes loading (actual size known)
  document.getElementById('drawing-img').addEventListener('load', buildOverlays);
  window.addEventListener('resize',  buildOverlays);

  // ── sidebar ───────────────────────────────────────────────────────────────
  function rebuildSidebar() {
    document.getElementById('comp-list').innerHTML = '';
    buildSidebar();
  }

  const COLOR = {
    KS: "#1e4d8c", KR: "#1a6b45", FBK: "#8a6200", "Tomrör": "#5a3a7a"
  };

  const DRAWING_TYPE_LABEL = {
    'belysning':  'Belysning (Lighting)',
    'el-kraft':   'El-kraft (Power)',
    'vvs':        'VVS (HVAC/Plumbing)',
    'unknown':    'Unknown discipline',
  };

  function buildSidebar() {
    const list = document.getElementById('comp-list');

    // ── Empty state for non-canalisation drawings ─────────────────────────
    if (summary.length === 0) {
      const label = DRAWING_TYPE_LABEL[currentDrawingType] || currentDrawingType;
      list.innerHTML = `
        <div style="padding:24px 16px 16px;text-align:center">
          <div style="font-size:28px;margin-bottom:10px">📄</div>
          <div style="font-size:13px;font-weight:600;color:#666666;margin-bottom:6px">
            No canalisation components
          </div>
          <div style="font-size:11px;color:#555555;line-height:1.6">
            Drawing type detected:<br>
            <strong style="color:#1a1a1a">${label}</strong>
          </div>
          <div style="font-size:11px;color:#888888;margin-top:10px">
            This drawing contains no KS / KR / FBK annotations.<br>
            The drawing image is still viewable above.
          </div>
        </div>
      `;
      return;
    }

    // ── Drawn + counted variants (from summary, count is a number) ────────
    const drawnSummary  = summary.filter(s => typeof s.count === 'number');
    const legendSummary = summary.filter(s => typeof s.count !== 'number');
    const col = s => COLOR[s.system] || "#94a3b8";

    drawnSummary.forEach(s => {
      const card = document.createElement('div');
      card.className = 'comp-card';
      card.style.setProperty('--c', col(s));

      const heights = [];
      if (s.ok_ofg_mm) heights.push(`ÖK ${s.ok_ofg_mm} mm ÖFG`);
      if (s.uk_ofg_mm) heights.push(`UK ${s.uk_ofg_mm} mm ÖFG`);

      const fireBadge = s.fire_rating
        ? `<span class="comp-card-badge" style="background:#ef444422;color:#ef4444;margin-left:4px">${s.fire_rating}</span>`
        : '';
      const vertTag = s.orientation === 'vertical'
        ? ' <em style="color:#94a3b8;font-size:10px">VERT</em>' : '';
      const widthStr = s.width_mm === 'per_drawing' ? 'per drawing'
                     : s.width_mm ? `${s.width_mm} mm` : '';
      const countBadge = `<span style="margin-left:auto;font-size:11px;color:#64748b">×${s.count}</span>`;

      card.innerHTML = `
        <div class="comp-card-title" style="justify-content:space-between">
          <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">
            <span class="comp-card-badge"
                  style="background:${col(s)}22;color:${col(s)}">${s.system}</span>
            ${s.name} ${widthStr}${vertTag}${fireBadge}
          </div>
          ${countBadge}
        </div>
        <div class="comp-card-sub">${heights.join(' · ') || 'No height data'}</div>
      `;

      // clicking highlights all matching instances on the drawing
      card.addEventListener('click', () => selectVariant(s));
      list.appendChild(card);
    });

    // ── Legend / notes entries ────────────────────────────────────────────
    if (legendSummary.length) {
      const sep = document.createElement('div');
      sep.style.cssText = 'padding:8px 16px 4px;font-size:10px;font-weight:600;color:#777777;text-transform:uppercase;letter-spacing:0.8px;border-top:1px solid #d4d4d4;margin-top:4px';
      sep.textContent = 'From legend / notes';
      list.appendChild(sep);

      legendSummary.forEach(s => {
        const card = document.createElement('div');
        card.className = 'comp-card';
        card.style.setProperty('--c', col(s));
        card.style.opacity = '0.75';

        const heights = [];
        if (s.ok_ofg_mm) heights.push(`ÖK ${s.ok_ofg_mm} mm ÖFG`);
        if (s.uk_ofg_mm) heights.push(`UK ${s.uk_ofg_mm} mm ÖFG`);
        const diam = s.diameter_mm ? `Ø${s.diameter_mm} mm` : '';
        const vertTag = s.orientation === 'vertical'
          ? ' <em style="color:#94a3b8;font-size:10px">VERT</em>' : '';
        const widthStr = s.width_mm === 'per_drawing' ? 'per drawing'
                       : s.width_mm ? `${s.width_mm} mm` : '';
        const sub = [diam, heights.join(' · ')].filter(Boolean).join('  ')
                    || (s.width_mm === 'per_drawing' ? 'Size per drawing' : 'No height data');

        card.innerHTML = `
          <div class="comp-card-title">
            <span class="comp-card-badge"
                  style="background:${col(s)}22;color:${col(s)}">${s.system}</span>
            ${s.name} ${widthStr}${vertTag}
          </div>
          <div class="comp-card-sub">${sub}</div>
        `;
        list.appendChild(card);
      });
    }
  }

  // ── select all drawn instances matching a summary variant ─────────────
  function selectVariant(s) {
    const matches = components.filter(c =>
      c.bbox !== null &&
      c.type        === s.system &&
      (c.size ? String(c.size) : null) === (s.width_mm !== 'per_drawing' ? String(s.width_mm) : null) &&
      (c.ok_height  || null) === (s.ok_ofg_mm  ? String(s.ok_ofg_mm)  : null) &&
      (c.uk_height  || null) === (s.uk_ofg_mm  ? String(s.uk_ofg_mm)  : null) &&
      (c.fire_rating || null) === (s.fire_rating || null)
    ).map(c => c.id);

    const allSame = matches.length > 0 &&
      matches.every(id => document.querySelector(`.comp-overlay[data-id="${id}"]`)?.classList.contains('active'));

    // Toggle: if all already active, deselect all; otherwise select all
    const nextState = !allSame;
    document.querySelectorAll('.comp-overlay, .comp-card').forEach(el => {
      el.classList.toggle('active', nextState && matches.includes(el.dataset.id));
    });
  }

  // ── selection ─────────────────────────────────────────────────────────────
  function selectComponent(id) {
    activeId = (activeId === id) ? null : id;

    document.querySelectorAll('.comp-overlay, .comp-card').forEach(el => {
      el.classList.toggle('active', el.dataset.id === activeId);
    });

    if (activeId) {
      const card = document.querySelector(`.comp-card[data-id="${activeId}"]`);
      if (card) card.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

      // scroll drawing to overlay
      const overlay = document.querySelector(`.comp-overlay[data-id="${activeId}"]`);
      if (overlay) overlay.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
  }

  // ── tooltip ───────────────────────────────────────────────────────────────
  const tt = document.getElementById('tooltip');

  function showTooltip(e, c) {
    const heights = [];
    if (c.ok_height) heights.push(`<div class="tt-row"><span>ÖK (top)</span><strong>${c.ok_height} mm ÖFG</strong></div>`);
    if (c.uk_height) heights.push(`<div class="tt-row"><span>UK (bottom)</span><strong>${c.uk_height} mm ÖFG</strong></div>`);

    const fireLine = c.fire_rating
      ? `<div class="tt-row"><span>Fire rating</span><strong style="color:#9c2c2c">${c.fire_rating}</strong></div>`
      : '';
    const vertLine = c.is_vertical
      ? `<div class="tt-row"><span>Orientation</span><strong>Vertical</strong></div>`
      : '';

    const sizeStr = c.size ? `${c.size} mm` : '';
    tt.innerHTML = `
      <div class="tt-type" style="color:${c.color}">${c.name || c.type}</div>
      <div class="tt-row"><span>Code</span><strong>${c.type}${sizeStr ? ' ' + sizeStr : ''}</strong></div>
      ${c.en_name ? `<div class="tt-row"><span>English</span><strong>${c.en_name}</strong></div>` : ''}
      ${heights.join('')}
      ${fireLine}${vertLine}
    `;
    tt.style.display = 'block';
    moveTooltip(e);
  }

  function moveTooltip(e) {
    const pad = 14;
    const tw = tt.offsetWidth, th = tt.offsetHeight;
    let x = e.clientX + pad, y = e.clientY + pad;
    if (x + tw > window.innerWidth  - 8) x = e.clientX - tw - pad;
    if (y + th > window.innerHeight - 8) y = e.clientY - th - pad;
    tt.style.left = x + 'px';
    tt.style.top  = y + 'px';
  }

  function hideTooltip() {
    tt.style.display = 'none';
  }

  // ── tab switching ─────────────────────────────────────────────────────────
  document.querySelectorAll('.sidebar-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.panel).classList.add('active');
    });
  });

  // ── estimation panel ──────────────────────────────────────────────────────
  const CONF_COLOR = c =>
    c >= 0.85 ? '#1a6b45' : c >= 0.65 ? '#8a6200' : '#9c2c2c';

  function rebuildEstimate(data) {
    buildEstimatePanel(data);
  }

  function buildEstimatePanel(data) {
    const list = document.getElementById('est-list');
    list.innerHTML = '';

    if (!data.items || data.items.length === 0) {
      const label = DRAWING_TYPE_LABEL[currentDrawingType] || currentDrawingType;
      list.innerHTML = `
        <div style="padding:24px 16px 16px;text-align:center">
          <div style="font-size:11px;color:#555555;line-height:1.6">
            No estimate available.<br>
            <strong style="color:#1a1a1a">${label}</strong> drawing<br>
            contains no canalisation systems.
          </div>
        </div>
      `;
      return;
    }

    const t    = data.totals;

    // ── totals block ──────────────────────────────────────────────────────
    const totDiv = document.createElement('div');
    totDiv.className = 'est-totals';
    const bySystemRows = Object.entries(t.by_system)
      .sort((a, b) => b[1].total_cost_sek - a[1].total_cost_sek)
      .map(([sys, v]) =>
        `<div class="tot-row"><span>${sys}</span><strong>${v.total_length_m} m &nbsp; ${v.total_cost_sek.toLocaleString()} SEK</strong></div>`
      ).join('');
    totDiv.innerHTML = `
      ${bySystemRows}
      <div class="tot-row grand">
        <span>Total (${t.total_length_m} m)</span>
        <strong>${t.total_cost_sek.toLocaleString()} SEK</strong>
      </div>
      <div style="font-size:10px;color:#475569;margin-top:6px">Excl. VAT · Indicative rates</div>
    `;
    list.appendChild(totDiv);

    // ── per-item cards ────────────────────────────────────────────────────
    data.items.filter(i => typeof i.count === 'number').forEach(item => {
      const card = document.createElement('div');
      card.className = 'est-card';
      const c   = COLOR[item.system] || '#94a3b8';
      card.style.borderLeftColor = c;

      const fr  = item.fire_rating
        ? `<span class="comp-card-badge" style="background:#9c2c2c22;color:#9c2c2c">${item.fire_rating}</span>` : '';
      const v   = item.orientation === 'vertical'
        ? `<span class="comp-card-badge" style="background:#5a3a7a22;color:#5a3a7a">VERT</span>` : '';
      const confColor = CONF_COLOR(item.confidence);
      const confBadge = `<span class="est-conf" style="background:${confColor}22;color:${confColor}">${(item.confidence * 100).toFixed(0)}%</span>`;

      const heightStr = [
        item.ok_ofg_mm ? `ÖK ${item.ok_ofg_mm}` : '',
        item.uk_ofg_mm ? `UK ${item.uk_ofg_mm}` : '',
      ].filter(Boolean).join(' / ') || '—';

      const confNotes = item.confidence_notes?.length
        ? `<div style="font-size:10px;color:#475569;margin-top:2px">${item.confidence_notes.join(' · ')}</div>`
        : '';

      card.innerHTML = `
        <div class="est-title">
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
            <span class="comp-card-badge" style="background:${c}22;color:${c}">${item.system}</span>
            ${item.width_mm === 'per_drawing' ? 'per drawing' : item.width_mm ? item.width_mm + ' mm' : ''}
            ${fr}${v}
            <span style="color:#64748b;font-size:11px">×${item.count}</span>
          </div>
          ${confBadge}
        </div>
        <div class="est-sub">
          ${heightStr} &nbsp;·&nbsp;
          H: ${item.horizontal_length_mm / 1000}m &nbsp;·&nbsp;
          V: ${item.vertical_length_mm / 1000}m &nbsp;·&nbsp;
          ${item.total_length_m}m total
          <br>
          ${item.unit_cost_sek_per_m} SEK/m &nbsp;·&nbsp;
          <span class="est-cost">${item.total_cost_sek.toLocaleString()} SEK</span>
          <span style="color:#475569"> (${item.length_source})</span>
        </div>
        ${confNotes}
      `;
      list.appendChild(card);
    });
  }
</script>
</body>
</html>
