<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KV. Läroboken 13 — Electrical Components</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #ebebeb;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── header ── */
    header {
      flex: 0 0 auto;
      padding: 10px 20px;
      background: #1c2b4a;
      border-bottom: 1px solid #14213a;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.3px;
    }
    header span {
      font-size: 12px;
      color: #8a9bbf;
    }
    .legend {
      display: flex;
      gap: 14px;
      margin-left: auto;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #c0cbdf;
    }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 2px;
    }

    /* ── main layout ── */
    main {
      flex: 1 1 0;
      display: flex;
      overflow: hidden;
    }

    /* ── drawing pane ── */
    #drawing-pane {
      flex: 1 1 0;
      overflow: auto;
      padding: 16px;
      background: #ebebeb;
    }

    #image-wrap {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    #drawing-img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 2px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    }

    /* ── component overlays ── */
    .comp-overlay {
      position: absolute;
      border: 2px solid currentColor;
      border-radius: 1px;
      cursor: pointer;
      opacity: 0.4;
      transition: opacity 0.12s;
    }
    .comp-overlay:hover  { opacity: 0.85; }
    .comp-overlay.active {
      opacity: 1;
      box-shadow: 0 0 0 2px currentColor;
    }

    /* ── tooltip ── */
    #tooltip {
      position: fixed;
      display: none;
      background: #ffffff;
      border: 1px solid #c8c8c8;
      border-radius: 3px;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.6;
      max-width: 240px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      pointer-events: none;
      z-index: 1000;
    }
    #tooltip .tt-type {
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 4px;
    }
    #tooltip .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      color: #666666;
    }
    #tooltip .tt-row strong { color: #1a1a1a; }

    /* ── sidebar ── */
    /* ── sidebar tabs ── */
    .sidebar-tabs {
      flex: 0 0 auto;
      display: flex;
      border-bottom: 1px solid #d4d4d4;
    }
    .sidebar-tab {
      flex: 1;
      padding: 9px 0;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      color: #888888;
      cursor: pointer;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border-bottom: 2px solid transparent;
      transition: color 0.1s, border-color 0.1s;
    }
    .sidebar-tab.active {
      color: #1c2b4a;
      border-bottom-color: #1c2b4a;
    }
    .sidebar-panel { display: none; overflow-y: auto; }
    .sidebar-panel.active { display: block; }
    #recompute-btn {
      display: none;
      margin-left: auto;
      margin-right: 6px;
      align-self: center;
      background: none;
      border: 1px solid #c0c8d8;
      border-radius: 3px;
      color: #4a6296;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      cursor: pointer;
      white-space: nowrap;
    }
    #recompute-btn:hover { background: #eef2f8; }
    #recompute-btn:disabled { color: #aaa; cursor: default; }

    #sidebar {
      flex: 0 0 300px;
      background: #ffffff;
      border-left: 1px solid #d4d4d4;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #comp-list { }

    /* ── components table ── */
    .tbl-head {
      display: grid;
      grid-template-columns: 64px 1fr 28px;
      padding: 5px 12px 5px 16px;
      font-size: 10px;
      font-weight: 600;
      color: #999999;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      border-bottom: 1px solid #e0e0e0;
      background: #f7f7f7;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .tbl-head .num { text-align: right; }
    .comp-row {
      display: grid;
      grid-template-columns: 64px 1fr 28px;
      padding: 7px 12px 7px 16px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      align-items: start;
      position: relative;
      transition: background 0.08s;
    }
    .comp-row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--c, #cccccc);
      opacity: 0;
      transition: opacity 0.1s;
    }
    .comp-row:hover  { background: #f6f6f6; }
    .comp-row.active { background: #eef2f8; }
    .comp-row.active::before { opacity: 1; }
    .comp-row.legend-row { opacity: 0.65; cursor: default; }
    .comp-code {
      font-family: 'SF Mono', 'Consolas', 'Menlo', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--c, #444444);
      padding-top: 1px;
    }
    .comp-name {
      font-size: 11px;
      color: #1a1a1a;
      line-height: 1.35;
    }
    .comp-detail {
      font-size: 10px;
      color: #888888;
      margin-top: 2px;
      line-height: 1.4;
    }
    .comp-validators {
      font-size: 10px;
      font-family: monospace;
      margin-top: 3px;
      letter-spacing: 0.3px;
      padding: 1px 4px;
      border-radius: 2px;
      display: inline-block;
    }
    .qty-edit {
      width: 44px;
      text-align: right;
      border: 1px solid transparent;
      border-radius: 3px;
      background: transparent;
      font: inherit;
      font-size: 12px;
      font-weight: 600;
      color: inherit;
      padding: 1px 3px;
      cursor: default;
    }
    .qty-edit:focus {
      outline: none;
      border-color: #4a6296;
      background: #ffffff;
      cursor: text;
    }
    .qty-edit.edited {
      color: #1a5c8a;
      border-color: #1a5c8a;
      background: #eef4fb;
    }
    .comp-fire {
      color: #9c2c2c;
      font-weight: 600;
    }
    .comp-qty {
      font-size: 12px;
      font-weight: 700;
      color: #1a1a1a;
      text-align: right;
      padding-top: 1px;
    }
    .tbl-sep {
      padding: 5px 16px 4px;
      font-size: 10px;
      font-weight: 600;
      color: #999999;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      border-top: 1px solid #e0e0e0;
      background: #f7f7f7;
    }

    /* ── estimate table ── */
    .est-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    .est-table th {
      padding: 5px 12px 5px 16px;
      text-align: left;
      font-size: 10px;
      font-weight: 600;
      color: #999999;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      border-bottom: 1px solid #e0e0e0;
      background: #f7f7f7;
      position: sticky;
      top: 0;
      white-space: nowrap;
    }
    .est-table th.num, .est-table td.num { text-align: right; }
    .est-table td {
      padding: 7px 12px 7px 16px;
      border-bottom: 1px solid #f0f0f0;
      color: #2a2a2a;
      vertical-align: middle;
    }
    .est-table td:first-child { padding-left: 16px; }
    .est-table tbody tr:hover { background: #f6f6f6; cursor: pointer; }
    .est-sys {
      font-family: 'SF Mono', 'Consolas', 'Menlo', monospace;
      font-size: 11px;
      font-weight: 700;
    }
    .est-fire {
      font-size: 9px;
      color: #9c2c2c;
      font-weight: 600;
      display: block;
      margin-top: 1px;
    }
    .est-table tfoot td {
      border-top: 2px solid #1c2b4a;
      border-bottom: none;
      font-weight: 700;
      color: #1a1a1a;
      padding-top: 8px;
      padding-bottom: 8px;
      background: #f7f7f7;
    }
    .est-total-cost {
      font-size: 13px;
      font-weight: 700;
      color: #1a1a1a;
    }
    .est-note {
      padding: 8px 16px;
      font-size: 10px;
      color: #999999;
      border-top: 1px solid #eeeeee;
    }
    /* ── zoom controls ── */
    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 0;
      border: 1px solid #4a6296;
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .zoom-btn {
      background: #2e4470;
      border: none;
      color: #c8d4ec;
      font-size: 16px;
      font-weight: 400;
      line-height: 1;
      padding: 3px 9px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .zoom-btn:hover { background: #3a5490; }
    #zoom-label {
      font-size: 11px;
      font-weight: 600;
      color: #c8d4ec;
      background: #1c2b4a;
      padding: 3px 7px;
      min-width: 40px;
      text-align: center;
      border-left: 1px solid #4a6296;
      border-right: 1px solid #4a6296;
      cursor: pointer;
      user-select: none;
    }
    #zoom-label:hover { color: #ffffff; }

    /* ── mode toggle ── */
    .mode-toggle {
      display: flex;
      border: 1px solid #4a6296;
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .mode-btn {
      background: #2e4470;
      border: none;
      color: #8a9bbf;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4px;
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .mode-btn + .mode-btn { border-left: 1px solid #4a6296; }
    .mode-btn.active { background: #1c2b4a; color: #ffffff; }
    .mode-btn:not(.active):hover { background: #3a5490; color: #c8d4ec; }

    /* ── rotate button ── */
    #rotate-btn {
      background: #2e4470;
      border: 1px solid #4a6296;
      border-radius: 3px;
      color: #c8d4ec;
      font-size: 15px;
      line-height: 1;
      padding: 3px 9px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #rotate-btn:hover { background: #3a5490; }

    /* ── drawing controls ── */
    .drawing-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    #drawing-select {
      background: #14213a;
      color: #e8edf5;
      border: 1px solid #2e4070;
      border-radius: 3px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      max-width: 200px;
    }
    .upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: #2e4470;
      border: 1px solid #4a6296;
      border-radius: 3px;
      color: #c8d4ec;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .upload-btn:hover { background: #3a5490; }
    .upload-btn input[type=file] { display: none; }
    #upload-status {
      font-size: 11px;
      color: #8a9bbf;
      min-width: 80px;
    }
    #upload-status.busy  { color: #c8a84a; }
    #upload-status.done  { color: #4a9c6e; }
    #upload-status.error { color: #b84a4a; }

    /* ── mobile ── */
    @media (max-width: 640px) {
      body { height: 100dvh; }

      header {
        flex-wrap: wrap;
        padding: 8px 12px;
        gap: 6px;
      }
      header h1 { font-size: 13px; order: 1; }
      .legend   { display: none; }
      .drawing-controls {
        order: 2;
        width: 100%;
        gap: 6px;
      }
      #drawing-select { flex: 1; max-width: none; font-size: 13px; }
      .upload-btn     { font-size: 13px; padding: 5px 10px; }
      #upload-status  { min-width: 0; }
      .zoom-controls  { margin-left: auto; }

      main { flex-direction: column; }

      #drawing-pane {
        flex: 0 0 42dvh;
        padding: 8px;
        overflow: auto;
      }
      #image-wrap  { display: block; width: 100%; }
      #drawing-img { width: 100%; height: auto; }

      #sidebar {
        flex: 1 1 0;
        width: 100%;
        border-left: none;
        border-top: 2px solid #1c2b4a;
        min-height: 0;
      }

      #tooltip {
        position: fixed;
        bottom: 12px;
        left: 12px;
        right: 12px;
        top: auto;
        max-width: none;
        width: auto;
        border-radius: 4px;
        box-shadow: 0 -2px 16px rgba(0,0,0,0.18);
      }

      .est-table th, .est-table td { padding: 6px 10px 6px 12px; }
    }
  </style>
</head>
<body>

<header>
  <h1 id="drawing-title">—</h1>
  <div class="drawing-controls">
    <select id="drawing-select" title="Switch drawing"></select>
    <label class="upload-btn" title="Upload PDF(s)">
      + Upload PDF
      <input type="file" id="file-input" accept=".pdf" multiple>
    </label>
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoom-out" title="Zoom out">−</button>
      <span id="zoom-label" title="Reset zoom">100%</span>
      <button class="zoom-btn" id="zoom-in" title="Zoom in">+</button>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn"        data-mode="text">Text</button>
      <button class="mode-btn"        data-mode="vector">Vector</button>
      <button class="mode-btn active" data-mode="ai">AI</button>
    </div>
    <button id="rotate-btn" title="Rotate 90°">↻</button>
    <span id="upload-status"></span>
  </div>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#1e4d8c"></div>KS
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#1a6b45"></div>KR
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#8a6200"></div>FBK
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#5a3a7a"></div>Tomrör
    </div>
  </div>
</header>

<main>
  <div id="drawing-pane">
    <div id="image-wrap">
      <img id="drawing-img" src="" alt="Electrical drawing" draggable="false">
      <!-- overlays injected by JS -->
    </div>
  </div>

  <nav id="sidebar">
    <div class="sidebar-tabs">
      <div class="sidebar-tab active" data-panel="comp-panel">Components</div>
      <div class="sidebar-tab"        data-panel="est-panel">Estimate</div>
      <button id="recompute-btn" title="Recompute AI extraction (uses tokens)">↻ Recompute</button>
    </div>
    <div id="comp-panel" class="sidebar-panel active">
      <div id="comp-list"></div>
    </div>
    <div id="est-panel" class="sidebar-panel">
      <div id="est-list"></div>
    </div>
  </nav>
</main>

<div id="tooltip"></div>

<script>
  let components = [];
  let summary    = [];
  let pageW = 1, pageH = 1;
  let activeId = null;
  let currentDrawing = null;
  let currentDrawingType = 'unknown';
  let extractionMode = 'ai';   // 'text' | 'vector' | 'ai'

  // ── drawing list + selector ────────────────────────────────────────────────
  async function loadDrawingList() {
    const { drawings } = await fetch('/drawings').then(r => r.json());
    const sel = document.getElementById('drawing-select');
    sel.innerHTML = drawings.map(n =>
      `<option value="${n}">${n}</option>`
    ).join('');
    if (drawings.length) switchDrawing(drawings[0]);
  }

  document.getElementById('drawing-select').addEventListener('change', e => {
    switchDrawing(e.target.value);
  });

  async function switchDrawing(name) {
    if (name === currentDrawing) return;
    currentDrawing = name;

    // Update image immediately (browser streams it)
    const img = document.getElementById('drawing-img');
    img.src = `/drawing/${encodeURIComponent(name)}/image`;

    // Update title
    document.getElementById('drawing-title').textContent = name.replace('.pdf', '');

    // Sync selector
    document.getElementById('drawing-select').value = name;

    // Fetch components + estimate in parallel (mode-aware)
    const compUrl = extractionMode === 'vector'
      ? `/drawing/${encodeURIComponent(name)}/components-vector`
      : extractionMode === 'ai'
      ? `/drawing/${encodeURIComponent(name)}/components-ai`
      : `/drawing/${encodeURIComponent(name)}/components`;
    const estUrl  = extractionMode === 'vector'
      ? `/drawing/${encodeURIComponent(name)}/estimate-vector`
      : extractionMode === 'ai'
      ? `/drawing/${encodeURIComponent(name)}/estimate-ai`
      : `/drawing/${encodeURIComponent(name)}/estimate`;

    // For AI mode: check first — show Run AI button if no result yet
    if (extractionMode === 'ai') {
      const check = await fetch(compUrl);
      if (check.status === 202) {
        showRunAIProgress(name);   // still running — poll
        return;
      }
      if (!check.ok) {
        showRunAIPrompt(name);
        return;
      }
      const [compData, estData] = await Promise.all([
        check.json(),
        fetch(estUrl).then(r => r.json()),
      ]);
      _applyDrawingData(compData, estData);
      return;
    }

    const [compData, estData] = await Promise.all([
      fetch(compUrl).then(r => r.json()),
      fetch(estUrl).then(r => r.json()),
    ]);
    _applyDrawingData(compData, estData);
  }

  function _applyDrawingData(compData, estData) {
    components         = compData.components || [];
    summary            = compData.summary    || [];
    pageW              = compData.page_width  || 1;
    pageH              = compData.page_height || 1;
    currentDrawingType = compData.drawing_type || 'unknown';
    activeId = null;
    displayRotation = 0;
    document.getElementById('image-wrap').style.transform = '';
    document.getElementById('image-wrap').style.margin    = '';
    buildOverlays();
    rebuildSidebar();
    rebuildEstimate(estData);
    // Show recompute button only in AI mode when results are loaded
    document.getElementById('recompute-btn').style.display =
      extractionMode === 'ai' ? 'block' : 'none';
  }

  document.getElementById('recompute-btn').addEventListener('click', async () => {
    if (!currentDrawing) return;
    const btn = document.getElementById('recompute-btn');
    btn.textContent = '↻ Running…';
    btn.disabled = true;
    try {
      const res = await fetch(
        `/drawing/${encodeURIComponent(currentDrawing)}/run-ai?force=true`,
        { method: 'POST' }
      );
      if (!res.ok) throw new Error(await res.text());
      const prev = currentDrawing;
      currentDrawing = null;   // force reload
      await switchDrawing(prev);
    } catch (err) {
      btn.textContent = '✗ Failed';
      btn.disabled = false;
      setTimeout(() => { btn.textContent = '↻ Recompute'; btn.disabled = false; }, 3000);
    }
  });

  function showRunAIPrompt(name) {
    // Show a "Run AI" button in the sidebar instead of component list
    const list = document.getElementById('comp-list');
    list.innerHTML = `
      <div style="padding:32px 16px;text-align:center">
        <div style="font-size:13px;font-weight:600;color:#444;margin-bottom:8px">
          No AI result for this drawing
        </div>
        <div style="font-size:11px;color:#888;margin-bottom:16px;line-height:1.6">
          Click below to run Claude Vision extraction.<br>This will use API tokens.
        </div>
        <button id="run-ai-btn" style="
          background:#1c2b4a;color:#fff;border:none;border-radius:4px;
          padding:8px 20px;font-size:12px;font-weight:600;cursor:pointer">
          ▶ Run AI Extraction
        </button>
      </div>`;
    document.getElementById('run-ai-btn').addEventListener('click', async () => {
      const btn = document.getElementById('run-ai-btn');
      btn.textContent = 'Running…';
      btn.disabled = true;
      try {
        const res = await fetch(`/drawing/${encodeURIComponent(name)}/run-ai`, { method: 'POST' });
        if (!res.ok) throw new Error(await res.text());
        // Reload the drawing in AI mode now that the result exists
        currentDrawing = null;
        await switchDrawing(name);
      } catch (err) {
        btn.textContent = '✗ Failed — check terminal';
        btn.disabled = false;
      }
    });
    document.getElementById('est-list').innerHTML = '';
  }

  function showRunAIProgress(name) {
    const list = document.getElementById('comp-list');
    list.innerHTML = `
      <div style="padding:32px 16px;text-align:center">
        <div style="font-size:13px;font-weight:600;color:#1a5c8a;margin-bottom:8px">
          AI extraction in progress…
        </div>
        <div style="font-size:11px;color:#888;line-height:1.6">
          Claude is analysing the drawing.<br>This page will refresh automatically.
        </div>
      </div>`;
    document.getElementById('est-list').innerHTML = '';
    // Poll every 5 seconds until result is ready
    setTimeout(async () => {
      currentDrawing = null;
      await switchDrawing(name);
    }, 5000);
  }

  // ── file upload ────────────────────────────────────────────────────────────
  document.getElementById('file-input').addEventListener('change', async e => {
    const files = e.target.files;
    if (!files.length) return;

    const status = document.getElementById('upload-status');
    status.className = 'busy';
    status.textContent = `Processing ${files.length} file(s)…`;

    const form = new FormData();
    for (const f of files) form.append('files', f);

    try {
      const res  = await fetch('/upload', { method: 'POST', body: form });
      const data = await res.json();

      if (data.errors?.length) {
        status.className = 'error';
        status.textContent = data.errors.map(e => e.error).join(', ');
      } else {
        status.className = 'done';
        const msgs = [];
        if (data.library_built) msgs.push('✓ Component library built');
        if (data.loaded.length) msgs.push(`✓ ${data.loaded.length} drawing(s) loaded`);
        status.textContent = msgs.join(' · ') || '✓ Done';
        setTimeout(() => { status.textContent = ''; status.className = ''; }, 4000);
      }

      // Refresh selector and switch to first newly loaded drawing
      const sel = document.getElementById('drawing-select');
      const allBefore = new Set([...sel.options].map(o => o.value));
      const { drawings } = await fetch('/drawings').then(r => r.json());
      sel.innerHTML = drawings.map(n => `<option value="${n}">${n}</option>`).join('');

      if (data.loaded.length) {
        const newName = data.loaded[0];
        await switchDrawing(newName);
      }
    } catch (err) {
      status.className = 'error';
      status.textContent = 'Upload failed';
    }

    e.target.value = '';   // reset so same file can be re-uploaded
  });

  // ── zoom ──────────────────────────────────────────────────────────────────
  const ZOOM_STEPS = [0.5, 0.75, 1.0, 1.25, 1.5, 2.0, 3.0];
  let zoomLevel = 1.0;

  function applyZoom() {
    const pane = document.getElementById('drawing-pane');
    const wrap = document.getElementById('image-wrap');
    const img  = document.getElementById('drawing-img');
    if (zoomLevel === 1.0) {
      wrap.style.width = '';
      img.style.width  = '';
      img.style.maxWidth = '100%';
    } else {
      const base = pane.clientWidth - 32;
      const w = Math.round(base * zoomLevel);
      wrap.style.width   = w + 'px';
      img.style.width    = w + 'px';
      img.style.maxWidth = 'none';
    }
    document.getElementById('zoom-label').textContent =
      Math.round(zoomLevel * 100) + '%';
    buildOverlays();
  }

  document.getElementById('zoom-in').addEventListener('click', () => {
    const idx = ZOOM_STEPS.findIndex(s => s > zoomLevel + 0.01);
    if (idx !== -1) { zoomLevel = ZOOM_STEPS[idx]; applyZoom(); }
  });
  document.getElementById('zoom-out').addEventListener('click', () => {
    const idx = [...ZOOM_STEPS].reverse().findIndex(s => s < zoomLevel - 0.01);
    if (idx !== -1) { zoomLevel = [...ZOOM_STEPS].reverse()[idx]; applyZoom(); }
  });
  document.getElementById('zoom-label').addEventListener('click', () => {
    zoomLevel = 1.0; applyZoom();
  });

  // ── rotate ────────────────────────────────────────────────────────────────
  let displayRotation = 0;

  function applyDisplayRotation() {
    const wrap = document.getElementById('image-wrap');
    const img  = document.getElementById('drawing-img');
    wrap.style.transform = `rotate(${displayRotation}deg)`;
    // Compensate layout: when 90/270 the visual width/height swap
    if (displayRotation === 90 || displayRotation === 270) {
      const m = (img.offsetWidth - img.offsetHeight) / 2;
      wrap.style.margin = `${m}px 0`;
    } else {
      wrap.style.margin = '';
    }
    buildOverlays();
  }

  document.getElementById('rotate-btn').addEventListener('click', () => {
    displayRotation = (displayRotation + 90) % 360;
    applyDisplayRotation();
  });

  // ── extraction mode toggle ────────────────────────────────────────────────
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.mode === extractionMode) return;
      extractionMode = btn.dataset.mode;
      document.querySelectorAll('.mode-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.mode === extractionMode));
      document.getElementById('recompute-btn').style.display =
        extractionMode === 'ai' ? 'block' : 'none';
      // Re-fetch current drawing in new mode
      if (currentDrawing) {
        const prev = currentDrawing;
        currentDrawing = null;   // force reload
        switchDrawing(prev);
      }
    });
  });

  // ── initial load ──────────────────────────────────────────────────────────
  loadDrawingList();

  const isTouchDevice = () => window.matchMedia('(pointer: coarse)').matches;

  // ── build overlays ────────────────────────────────────────────────────────
  function buildOverlays() {
    const wrap = document.getElementById('image-wrap');
    const img  = document.getElementById('drawing-img');

    // Remove old overlays
    wrap.querySelectorAll('.comp-overlay').forEach(e => e.remove());

    const scaleX = img.clientWidth  / pageW;
    const scaleY = img.clientHeight / pageH;

    components.filter(c => c.bbox !== null).forEach(c => {
      const [x0, y0, x1, y1] = c.bbox;
      const div = document.createElement('div');
      div.className = 'comp-overlay';
      div.dataset.id = c.id;
      div.style.left       = `${x0 * scaleX}px`;
      div.style.top        = `${y0 * scaleY}px`;
      div.style.width      = `${(x1 - x0) * scaleX}px`;
      div.style.height     = `${(y1 - y0) * scaleY}px`;
      div.style.color      = c.color;
      div.style.background = c.color + '22';

      div.addEventListener('mouseenter', e => showTooltip(e, c));
      div.addEventListener('mousemove',  e => moveTooltip(e));
      div.addEventListener('mouseleave', hideTooltip);
      div.addEventListener('click', e => {
        selectComponent(c.id);
        if (isTouchDevice()) {
          showTooltip(e, c);
          clearTimeout(tt._hideTimer);
          tt._hideTimer = setTimeout(hideTooltip, 3000);
        }
      });
      wrap.appendChild(div);
    });
  }

  // Rebuild overlays when image finishes loading (actual size known)
  document.getElementById('drawing-img').addEventListener('load', buildOverlays);
  window.addEventListener('resize',  buildOverlays);

  // ── sidebar ───────────────────────────────────────────────────────────────
  function rebuildSidebar() {
    document.getElementById('comp-list').innerHTML = '';
    buildSidebar();
  }

  const COLOR = {
    KS: "#1e4d8c", KR: "#1a6b45", FBK: "#8a6200", "Tomrör": "#5a3a7a"
  };

  const DRAWING_TYPE_LABEL = {
    'belysning':  'Belysning (Lighting)',
    'el-kraft':   'El-kraft (Power)',
    'vvs':        'VVS (HVAC/Plumbing)',
    'unknown':    'Unknown discipline',
  };

  function buildSidebar() {
    const list = document.getElementById('comp-list');

    // ── Empty state ───────────────────────────────────────────────────────
    if (summary.length === 0) {
      const label = DRAWING_TYPE_LABEL[currentDrawingType] || currentDrawingType;
      list.innerHTML = `
        <div style="padding:24px 16px;text-align:center">
          <div style="font-size:13px;font-weight:600;color:#666666;margin-bottom:6px">No components extracted</div>
          <div style="font-size:11px;color:#888888;line-height:1.6">
            Type: <strong style="color:#1a1a1a">${label}</strong><br>
            No KS / KR / FBK annotations found.
          </div>
        </div>`;
      return;
    }

    const drawnSummary  = summary.filter(s => typeof s.count === 'number')
      .filter(s => {
        // Hide zero-quantity items in AI mode
        if (extractionMode !== 'ai') return true;
        const qty = s.measurement_type === 'length' ? (s.total_length_m ?? 0) : (s.count ?? 0);
        return qty > 0;
      });
    const legendSummary = summary.filter(s => typeof s.count !== 'number');
    const col = s => COLOR[s.system] || "#555555";

    // ── Table header ──────────────────────────────────────────────────────
    const head = document.createElement('div');
    head.className = 'tbl-head';
    const qtyLabel = (extractionMode === 'vector' || extractionMode === 'ai') ? 'Qty / Length' : 'Qty';
    head.innerHTML = `<span>Code</span><span>Description</span><span class="num">${qtyLabel}</span>`;
    list.appendChild(head);

    // ── Drawn rows ────────────────────────────────────────────────────────
    drawnSummary.forEach(s => {
      const row = document.createElement('div');
      row.className = 'comp-row';
      row.dataset.vkey = variantKey(s);
      row.style.setProperty('--c', col(s));

      const sizeStr  = s.width_mm === 'per_drawing' ? 'per dwg'
                     : s.width_mm ? `${s.width_mm} mm` : '';
      const vertStr  = s.orientation === 'vertical' ? 'Vertical' : '';
      const fireStr  = s.fire_rating ? `<span class="comp-fire">${s.fire_rating}</span>` : '';
      const hParts   = [];
      if (s.ok_ofg_mm) hParts.push(`ÖK ${s.ok_ofg_mm}`);
      if (s.uk_ofg_mm) hParts.push(`UK ${s.uk_ofg_mm}`);
      const hStr     = hParts.length ? hParts.join(' · ') + ' mm ÖFG' : '';
      const details  = [sizeStr, vertStr, hStr, fireStr].filter(Boolean).join(' &nbsp;·&nbsp; ');

      // Validator breakdown for AI count items
      let validatorHtml = '';
      if (extractionMode === 'ai' && s.count_grid_a != null) {
        const conf = s.count_confidence || 'unknown';
        const isHigh   = conf === 'high';
        const isMedium = conf === 'medium';
        const isLow    = conf === 'low';
        const icon       = isHigh ? '✓' : isMedium ? '⚠' : '✗';
        const confColor  = isHigh ? '#2a7a3a' : isMedium ? '#8a6200' : '#9c2c2c';
        const manualNote = isLow
          ? `<span style="font-weight:600"> — needs manual check</span>` : '';
        validatorHtml = `<div class="comp-validators" style="color:${confColor}">
          ${icon} A:${s.count_grid_a} B:${s.count_grid_b} C:${s.count_grid_c}${manualNote}
        </div>`;
      }

      const isLengthItem = (extractionMode === 'vector' || extractionMode === 'ai') && s.total_length_m != null;
      const qtyDisplay   = isLengthItem
        ? s.total_length_m.toFixed(1) + ' m'
        : s.count;
      const qtyUnit      = isLengthItem ? '' : ' pcs';

      row.innerHTML = `
        <div class="comp-code">${s.system}</div>
        <div>
          <div class="comp-name">${s.name}</div>
          ${details ? `<div class="comp-detail">${details}</div>` : ''}
          ${validatorHtml}
        </div>
        <div class="comp-qty" style="display:flex;align-items:center;gap:2px">
          ${extractionMode === 'ai' && !isLengthItem
            ? `<input class="qty-edit" type="number" min="0" value="${s.count}"
                 title="Click to edit count" /><span style="font-size:11px">pcs</span>`
            : `${qtyDisplay}${qtyUnit}`
          }
        </div>`;

      // Make editable input not bubble row-click; mark edited value
      if (extractionMode === 'ai' && !isLengthItem) {
        const input = row.querySelector('.qty-edit');
        input.addEventListener('click', e => e.stopPropagation());
        const aiCount = s.count;   // original AI value before any edits
        input.addEventListener('change', () => {
          const newVal = Math.max(0, parseInt(input.value) || 0);
          input.value  = newVal;
          s.count      = newVal;
          input.classList.toggle('edited', newVal !== aiCount);
        });
        input.addEventListener('focus', () => input.select());
      }

      row.addEventListener('click', () => {
        list.querySelectorAll('.comp-row').forEach(r => r.classList.remove('active'));
        row.classList.add('active');
        selectVariant(s);
      });
      list.appendChild(row);
    });

    // ── Legend / notes rows ───────────────────────────────────────────────
    if (legendSummary.length) {
      const sep = document.createElement('div');
      sep.className = 'tbl-sep';
      sep.textContent = 'Legend / Notes';
      list.appendChild(sep);

      legendSummary.forEach(s => {
        const row = document.createElement('div');
        row.className = 'comp-row legend-row';
        row.style.setProperty('--c', col(s));

        const diamStr = s.diameter_mm ? `Ø${s.diameter_mm} mm` : '';
        const sizeStr = s.width_mm === 'per_drawing' ? 'per dwg'
                      : s.width_mm ? `${s.width_mm} mm` : '';
        const vertStr = s.orientation === 'vertical' ? 'Vertical' : '';
        const details = [diamStr, sizeStr, vertStr].filter(Boolean).join(' · ');

        row.innerHTML = `
          <div class="comp-code">${s.system}</div>
          <div>
            <div class="comp-name">${s.name}</div>
            ${details ? `<div class="comp-detail">${details}</div>` : ''}
          </div>
          <div class="comp-qty" style="color:#aaaaaa">—</div>`;
        list.appendChild(row);
      });
    }
  }

  // ── stable key for a summary / estimate item ─────────────────────────
  function variantKey(s) {
    return [s.system, s.width_mm ?? '', s.ok_ofg_mm ?? '', s.uk_ofg_mm ?? '',
            s.fire_rating ?? '', s.orientation].join('|');
  }

  // ── select all drawn instances matching a summary variant ─────────────
  function selectVariant(s) {
    // Normalise to null so String(null)="null" can't cause false mismatches
    const sWidth = (s.width_mm != null && s.width_mm !== 'per_drawing')
                   ? String(s.width_mm) : null;
    const sOk    = s.ok_ofg_mm  != null ? String(s.ok_ofg_mm)  : null;
    const sUk    = s.uk_ofg_mm  != null ? String(s.uk_ofg_mm)  : null;
    const sFire  = s.fire_rating || null;

    const matches = components.filter(c =>
      c.bbox !== null &&
      c.type === s.system &&
      (c.size        || null) === sWidth &&
      (c.ok_height   || null) === sOk   &&
      (c.uk_height   || null) === sUk   &&
      (c.fire_rating || null) === sFire
    ).map(c => c.id);

    const allActive = matches.length > 0 &&
      matches.every(id =>
        document.querySelector(`.comp-overlay[data-id="${id}"]`)?.classList.contains('active'));

    const nextState = !allActive;
    document.querySelectorAll('.comp-overlay').forEach(el => {
      el.classList.toggle('active', nextState && matches.includes(el.dataset.id));
    });
  }

  // ── selection ─────────────────────────────────────────────────────────────
  function selectComponent(id) {
    activeId = (activeId === id) ? null : id;

    // Highlight / un-highlight overlays
    document.querySelectorAll('.comp-overlay').forEach(el => {
      el.classList.toggle('active', el.dataset.id === activeId);
    });

    // Clear previous table highlights
    document.querySelectorAll('.comp-row').forEach(r => r.classList.remove('active'));
    document.querySelectorAll('.est-table tbody tr').forEach(r => r.style.background = '');

    if (activeId) {
      // Find component object
      const c = components.find(comp => comp.id === activeId);
      if (c) {
        // Find matching summary variant
        const s = summary.find(s =>
          s.system === c.type &&
          ((c.size   || null) === ((s.width_mm != null && s.width_mm !== 'per_drawing') ? String(s.width_mm) : null)) &&
          ((c.ok_height || null) === (s.ok_ofg_mm != null ? String(s.ok_ofg_mm) : null)) &&
          ((c.uk_height || null) === (s.uk_ofg_mm != null ? String(s.uk_ofg_mm) : null)) &&
          ((c.fire_rating || null) === (s.fire_rating || null))
        );
        if (s) {
          const key = variantKey(s);
          const compRow = document.querySelector(`.comp-row[data-vkey="${key}"]`);
          if (compRow) {
            compRow.classList.add('active');
            compRow.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
          }
          const estRow = document.querySelector(`.est-table tbody tr[data-vkey="${key}"]`);
          if (estRow) estRow.style.background = '#eef2f8';
        }
      }

      // Scroll the clicked overlay into view
      const overlay = document.querySelector(`.comp-overlay[data-id="${activeId}"]`);
      if (overlay) overlay.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
  }

  // ── tooltip ───────────────────────────────────────────────────────────────
  const tt = document.getElementById('tooltip');

  function showTooltip(e, c) {
    const heights = [];
    if (c.ok_height) heights.push(`<div class="tt-row"><span>ÖK (top)</span><strong>${c.ok_height} mm ÖFG</strong></div>`);
    if (c.uk_height) heights.push(`<div class="tt-row"><span>UK (bottom)</span><strong>${c.uk_height} mm ÖFG</strong></div>`);

    const fireLine = c.fire_rating
      ? `<div class="tt-row"><span>Fire rating</span><strong style="color:#9c2c2c">${c.fire_rating}</strong></div>`
      : '';
    const vertLine = c.is_vertical
      ? `<div class="tt-row"><span>Orientation</span><strong>Vertical</strong></div>`
      : '';

    const sizeStr = c.size ? `${c.size} mm` : '';
    tt.innerHTML = `
      <div class="tt-type" style="color:${c.color}">${c.name || c.type}</div>
      <div class="tt-row"><span>Code</span><strong>${c.type}${sizeStr ? ' ' + sizeStr : ''}</strong></div>
      ${c.en_name ? `<div class="tt-row"><span>English</span><strong>${c.en_name}</strong></div>` : ''}
      ${heights.join('')}
      ${fireLine}${vertLine}
    `;
    tt.style.display = 'block';
    moveTooltip(e);
  }

  function moveTooltip(e) {
    const pad = 14;
    const tw = tt.offsetWidth, th = tt.offsetHeight;
    let x = e.clientX + pad, y = e.clientY + pad;
    if (x + tw > window.innerWidth  - 8) x = e.clientX - tw - pad;
    if (y + th > window.innerHeight - 8) y = e.clientY - th - pad;
    tt.style.left = x + 'px';
    tt.style.top  = y + 'px';
  }

  function hideTooltip() {
    tt.style.display = 'none';
  }

  // ── tab switching ─────────────────────────────────────────────────────────
  document.querySelectorAll('.sidebar-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.panel).classList.add('active');
    });
  });

  // ── estimation panel ──────────────────────────────────────────────────────
  const CONF_COLOR = c =>
    c >= 0.85 ? '#1a6b45' : c >= 0.65 ? '#8a6200' : '#9c2c2c';

  function rebuildEstimate(data) {
    buildEstimatePanel(data);
  }

  function buildEstimatePanel(data) {
    const list = document.getElementById('est-list');
    list.innerHTML = '';

    if (!data.items || data.items.length === 0) {
      const label = DRAWING_TYPE_LABEL[currentDrawingType] || currentDrawingType;
      list.innerHTML = `
        <div style="padding:24px 16px;text-align:center">
          <div style="font-size:13px;font-weight:600;color:#666666;margin-bottom:6px">No estimate available</div>
          <div style="font-size:11px;color:#888888;line-height:1.6">
            <strong style="color:#1a1a1a">${label}</strong> drawing<br>
            contains no canalisation systems.
          </div>
        </div>`;
      return;
    }

    const t     = data.totals;
    const isAI  = extractionMode === 'ai';
    // For AI mode show all items (except zeros); otherwise only length items with count
    const items = isAI
      ? data.items.filter(i => {
          const qty = i.measurement_type === 'length' ? (i.total_length_m ?? 0) : (i.count ?? 0);
          return qty > 0;
        })
      : data.items.filter(i => typeof i.count === 'number');

    const table = document.createElement('table');
    table.className = 'est-table';

    if (isAI) {
      table.innerHTML = `
        <thead>
          <tr>
            <th>Component</th>
            <th class="num">Qty / Length</th>
            <th class="num">SEK/m</th>
            <th class="num">SEK</th>
          </tr>
        </thead>
        <tbody></tbody>
        <tfoot>
          <tr>
            <td>Total (length-based)</td>
            <td class="num">${t.total_length_m} m</td>
            <td></td>
            <td class="num est-total-cost">${t.total_cost_sek.toLocaleString()}</td>
          </tr>
        </tfoot>`;
    } else {
      table.innerHTML = `
        <thead>
          <tr>
            <th>System</th>
            <th class="num">Length</th>
            <th class="num">SEK/m</th>
            <th class="num">SEK</th>
          </tr>
        </thead>
        <tbody></tbody>
        <tfoot>
          <tr>
            <td>Total</td>
            <td class="num">${t.total_length_m} m</td>
            <td></td>
            <td class="num est-total-cost">${t.total_cost_sek.toLocaleString()}</td>
          </tr>
        </tfoot>`;
    }

    const tbody = table.querySelector('tbody');
    items.forEach(item => {
      const c       = COLOR[item.system] || '#555555';
      const sizeStr = item.width_mm === 'per_drawing' ? ''
                    : item.width_mm ? ` ${item.width_mm}mm` : '';
      const vertStr = item.orientation === 'vertical' ? ' V' : '';
      const fire    = item.fire_rating
        ? `<span class="est-fire">${item.fire_rating}</span>` : '';
      const mtype   = item.measurement_type || 'length';

      const qtyCell = mtype === 'length'
        ? `${(item.total_length_m ?? 0).toFixed(1)} m`
        : `${item.count ?? 0} pcs`;
      const costCell = item.total_cost_sek != null
        ? item.total_cost_sek.toLocaleString()
        : '—';
      const rateCell = item.unit_cost_sek_per_m != null
        ? item.unit_cost_sek_per_m
        : '—';

      const tr = document.createElement('tr');
      tr.style.cursor = 'pointer';
      tr.dataset.vkey = variantKey(item);
      tr.innerHTML = `
        <td>
          <span class="est-sys" style="color:${c}">${item.system}${sizeStr}${vertStr}</span>
          ${fire}
          ${isAI && item.name ? `<span style="font-size:10px;color:#888;margin-left:4px">${item.name}</span>` : ''}
        </td>
        <td class="num">${qtyCell}</td>
        <td class="num" style="color:#666666">${rateCell}</td>
        <td class="num" style="font-weight:600">${costCell}</td>`;
      tr.addEventListener('click', () => {
        tbody.querySelectorAll('tr').forEach(r => r.style.background = '');
        tr.style.background = '#eef2f8';
        selectVariant(item);
      });
      tbody.appendChild(tr);
    });
    list.appendChild(table);

    const note = document.createElement('div');
    note.className = 'est-note';
    note.textContent = isAI
      ? 'AI vision estimate · Excl. VAT · Indicative rates'
      : 'Excl. VAT · Indicative rates';
    list.appendChild(note);
  }
</script>
</body>
</html>
